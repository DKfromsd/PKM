<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey's Kitchen - Digital Brain</title>
    <!-- Marked for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Gobi SDK -->
    <script src="https://gobispace.com/gobi.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&display=swap');

:root {
    --bg: #ffffff;
    --text: #111111;
    --accent: #8b4513;
    --secondary: #666666;
    --border: #eeeeee;
}

* { box-sizing: border-box; }
body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0; padding: 0;
    line-height: 1.5;
}

/* Fixed Navigation */
nav {
    position: fixed; top: 0; left: 0; width: 100%;
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    z-index: 1000; border-bottom: 1px solid var(--border);
    padding: 15px 0;
}
.nav-content {
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    padding: 0 20px;
}
.nav-btn {
    background: none; border: none; padding: 8px 16px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 500;
    font-size: 0.8rem; text-transform: uppercase; cursor: pointer;
    color: #888; border-radius: 20px; transition: all 0.2s;
}
.nav-btn:hover { color: var(--accent); background: #fcfcfc; }
.nav-btn.active { background: var(--accent); color: white; }

/* Header */
.container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 60px; }
header { text-align: center; margin-bottom: 100px; }
.title { font-family: 'Playfair Display', serif; font-size: 4.5rem; font-weight: 700; font-style: italic; color: var(--accent); margin: 0; }
.motto { font-family: 'Space Grotesk', sans-serif; letter-spacing: 4px; text-transform: uppercase; font-size: 0.9rem; color: #aaa; margin-top: 15px; }

/* Section Styling */
.cuisine-section { margin-bottom: 100px; scroll-margin-top: 100px; }
.section-header { margin-bottom: 40px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
.section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; font-weight: 700; }

/* Card Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
.card {
    background: white; border: 1px solid var(--border); padding: 40px;
    border-radius: 16px; cursor: pointer; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    display: flex; flex-direction: column; position: relative; height: 100%;
}
.card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: #ddd; }
.card-tag { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; }
.card-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: 0 0 15px 0; color: var(--text); line-height: 1.2; }

/* Viewer Overlay */
#viewer {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: white; z-index: 2000; overflow-y: auto; padding: 80px 24px;
}
.viewer-inner { max-width: 800px; margin: 0 auto; }
.close-btn { position: fixed; top: 30px; right: 40px; font-size: 3rem; cursor: pointer; border: none; background: none; font-weight: 200; }

/* Debug Console */
#debug-log { background: #212529; color: #0f0; padding: 20px; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 50px; white-space: pre-wrap; height: 200px; overflow-y: auto; border: 2px solid #444; }

/* Status Overlay */
#status-overlay { position: fixed; inset: 0; background: white; z-index: 3000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.5s; }
    </style>
</head>
<body>

<div id="status-overlay">
    <h1 style="font-family: 'Playfair Display'; font-style: italic; color: var(--accent);">Mickey's Kitchen</h1>
    <p id="status-msg">Heating up the stove...</p>
</div>

<nav>
    <div class="nav-content" id="nav-list">
        <button class="nav-item active" onclick="scrollToId('header')">Home</button>
    </div>
</nav>

<div class="container">
    <header id="header">
        <h1 class="title">Mickey's Kitchen</h1>
        <div class="motto">Curated Insights & Personal Brain Recipes</div>
    </header>

    <div id="kitchen-root"></div>

    <footer>
        <h2 style="font-family: 'Playfair Display'; font-style: italic; margin-bottom: 30px; text-align: center;">Chef's Kitchen Log</h2>
        <div id="debug-log">Discovering ingredients...</div>
    </footer>
</div>

<div id="viewer">
    <button class="close-btn" onclick="closeViewer()">&times;</button>
    <div class="viewer-inner" id="viewer-body"></div>
</div>

<script>
    const categories = ['Stock', 'StockBot', 'Music', 'Health', 'Illustration', 'Thoughts', 'Study'];
    const dLog = document.getElementById('debug-log');

    const log = (msg) => {
        const time = new Date().toLocaleTimeString();
        dLog.innerText += `\n[${time}] ${msg}`;
        dLog.scrollTop = dLog.scrollHeight;
        console.log(msg);
    };

    async function init() {
        log("Kitchen engine starting...");
        try {
            // Wait for SDK
            let retries = 0;
            while (typeof window.gobi === 'undefined' && retries < 15) {
                log(`Waiting for SDK... (${retries+1}/15)`);
                await new Promise(r => setTimeout(r, 500));
                retries++;
            }

            if (typeof window.gobi === 'undefined') {
                log("FATAL: Gobi SDK Timeout!");
                document.getElementById('status-msg').innerText = "SDK Load Timeout. Please refresh.";
                return;
            }

            log("SDK Connected. Vault: " + gobi.vault.vaultId);
            document.getElementById('status-msg').innerText = "Reading pantry folders...";

            const menu = {};
            let totalFound = 0;

            for (const cat of categories) {
                log(`Reading folder: "../${cat}"`);
                try {
                    const files = await gobi.listFiles(`../${cat}`);
                    const mdFiles = files.filter(f => f.type === 'file' && f.name.endsWith('.md') && f.name !== 'README.md');
                    if (mdFiles.length > 0) {
                        menu[cat] = mdFiles;
                        totalFound += mdFiles.length;
                        log(`  SUCCESS: Found ${mdFiles.length} recipes.`);
                    } else {
                        log(`  EMPTY: No markdown files found in ${cat}.`);
                    }
                } catch (e) {
                    log(`  SKIP: Folder ${cat} unreachable: ${e.message}`);
                }
            }

            if (totalFound > 0) {
                render(menu);
                document.getElementById('status-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('status-overlay').style.display = 'none', 500);
                log("RENDER COMPLETE.");
            } else {
                log("WARNING: No recipes found in any folder.");
                document.getElementById('status-msg').innerText = "Pantry is empty. Please check your vault structure.";
            }

        } catch (err) {
            log("CRITICAL ERROR: " + err.message);
            document.getElementById('status-msg').innerText = "Chef's Error: " + err.message;
        }
    }

    function render(menu) {
        const root = document.getElementById('kitchen-root');
        const nav = document.getElementById('nav-list');
        const sortedFolders = Object.keys(menu).sort();

        sortedFolders.forEach(folder => {
            // Add Nav
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = folder;
            btn.onclick = () => scrollToId(folder);
            nav.appendChild(btn);

            // Add Section
            const section = document.createElement('section');
            section.className = 'cuisine-section';
            section.id = folder;
            section.innerHTML = `<div class="section-header"><h2 class="section-title">${folder}</h2></div><div class="grid" id="grid-${folder}"></div>`;
            root.appendChild(section);

            const grid = document.getElementById(`grid-${folder}`);
            menu[folder].forEach(file => {
                const card = document.createElement('div');
                card.className = 'card';
                const fullPath = `../${folder}/${file.name}`;
                card.onclick = () => openDoc(fullPath);
                card.innerHTML = `<div class="card-tag">${folder}</div><h3 class="card-title">${file.name.replace('.md', '')}</h3>`;
                grid.appendChild(card);
            });
        });
    }

    async function openDoc(path) {
        try {
            log(`Opening recipe: ${path}`);
            const content = await gobi.readFile(path);
            document.getElementById('viewer-body').innerHTML = `
                <div style="margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee;">
                    <small style="color: #aaa; text-transform: uppercase; letter-spacing: 1px;">Location: ${path.replace('../', '')}</small>
                </div>
                ${marked.parse(content)}
            `;
            document.getElementById('viewer').style.display = 'block';
            document.body.style.overflow = 'hidden';
        } catch (e) {
            log(`ERROR opening ${path}: ${e.message}`);
            alert("Error: " + e.message);
        }
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function scrollToId(id) {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 100, behavior: 'smooth' });
    }

    // Start
    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
