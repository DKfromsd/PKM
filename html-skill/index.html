<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey's Kitchen - Digital Brain Recipe</title>
    <script src="https://gobispace.com/gobi.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --bg-color: #fffaf0;
            --card-bg: #ffffff;
            --text-color: #2c2c2c;
            --accent-color: #8b4513; /* Wood brown */
            --secondary-color: #6b8e23; /* Olive Green */
            --border-color: #e8dfd0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Lora', serif;
            margin: 0; padding: 0;
            line-height: 1.8;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            border-bottom: 3px double var(--accent-color);
            margin-bottom: 50px;
            padding-bottom: 30px;
        }

        .kitchen-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: var(--accent-color);
            margin: 0;
            font-style: italic;
        }

        .cuisine-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 50px;
        }

        .cuisine-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 10px 25px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            border-radius: 30px;
        }

        .cuisine-btn:hover, .cuisine-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
        }

        .recipe-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border-radius: 4px;
            display: flex; flex-direction: column;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(139, 69, 19, 0.08);
        }

        .recipe-card .badge {
            font-family: 'Roboto', sans-serif;
            font-size: 0.7rem;
            color: var(--secondary-color);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .recipe-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin: 0 0 15px 0;
            color: var(--text-color);
        }

        /* Full Viewer Overlay */
        #recipe-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 250, 240, 0.98);
            z-index: 2000;
            overflow-y: auto;
        }

        .viewer-inner {
            max-width: 850px;
            margin: 80px auto;
            background: white;
            padding: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .close-viewer {
            position: fixed;
            top: 30px; right: 40px;
            font-size: 3rem;
            cursor: pointer;
            color: var(--accent-color);
            border: none; background: none;
        }

        .markdown-content img { max-width: 100%; border-radius: 4px; }
        .markdown-content pre { background: #f8f8f8; padding: 20px; overflow-x: auto; border-radius: 4px; }

        /* AI Chef */
        .chef-footer {
            margin-top: 100px;
            padding: 60px 20px;
            background: white;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        #chat-log {
            max-width: 700px;
            margin: 30px auto;
            text-align: left;
            border: 1px solid var(--border-color);
            height: 250px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .chat-input-area {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        input#chat-input {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            font-family: 'Lora', serif;
        }

        .chef-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; margin-bottom: 10px; color: var(--secondary-color); font-weight: 700;">Private Culinary Notes</div>
        <h1 class="kitchen-title">Mickey's Kitchen</h1>
        <p style="color: #888; font-style: italic;">"Turning raw data into delicious knowledge recipes."</p>
    </header>

    <nav class="cuisine-nav" id="cuisine-nav">
        <button class="cuisine-btn active" onclick="filterCuisine('all', this)">All Specials</button>
    </nav>

    <div class="recipe-grid" id="recipe-grid">
        <p style="text-align: center; grid-column: 1/-1;">Heating up the stove...</p>
    </div>
</div>

<div id="recipe-viewer">
    <button class="close-viewer" onclick="closeRecipe()">&times;</button>
    <div class="viewer-inner">
        <div id="viewer-body"></div>
    </div>
</div>

<footer class="chef-footer">
    <h2 style="font-family: 'Playfair Display'; italic;">Ask the Head Chef</h2>
    <div id="chat-log"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="What's on the menu today?">
        <button class="chef-btn" onclick="askChef()">Send</button>
    </div>
</footer>

<script>
    window.onload = async () => {
        try {
            const metadata = await gobi.vault.getMetadata();
            const nav = document.getElementById('cuisine-nav');
            const folders = (metadata.folders || []).filter(f => !f.startsWith('.') && !f.startsWith('_'));

            folders.forEach(f => {
                const b = document.createElement('button');
                b.className = 'cuisine-btn';
                b.innerText = f;
                b.onclick = (e) => filterCuisine(f, e.target);
                nav.appendChild(b);
            });

            const updates = await gobi.listBrainUpdates();
            renderRecipes(updates);
        } catch (err) { console.error(err); }
    };

    async function filterCuisine(folder, btn) {
        document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.getElementById('recipe-grid');
        grid.innerHTML = "<p>Searching the pantry...</p>";

        try {
            const list = folder === 'all'
                ? await gobi.listBrainUpdates()
                : await gobi.vault.search(`path:${folder}`);
            renderRecipes(list);
        } catch (err) { console.error(err); }
    }

    function renderRecipes(list) {
        const grid = document.getElementById('recipe-grid');
        grid.innerHTML = "";

        if (!list || list.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>No recipes found here yet.</p>";
            return;
        }

        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.onclick = () => openRecipe(item.path);

            const folder = item.path.includes('/') ? item.path.split('/')[0] : 'General';
            const title = item.title || item.path.split('/').pop().replace('.md', '');

            card.innerHTML = `
                <div class="badge">${folder}</div>
                <h3>${title}</h3>
                <div style="font-size: 0.9rem; color: #777; flex-grow: 1;">${item.snippet || 'A secret recipe from Mickey\'s vault...'}</div>
                <div style="font-size: 0.75rem; color: #bbb; margin-top: 20px;">Prepared on ${new Date(item.timestamp || Date.now()).toLocaleDateString()}</div>
            `;
            grid.appendChild(card);
        });
    }

    async function openRecipe(path) {
        try {
            const content = await gobi.vault.getFileContent(path);
            const html = gobi.renderMarkdown(content);
            const viewer = document.getElementById('recipe-viewer');
            const body = document.getElementById('viewer-body');

            body.innerHTML = `
                <div style="text-align: center; margin-bottom: 50px;">
                    <h1 style="font-family: 'Playfair Display'; font-size: 3rem; color: var(--accent-color);">${path.split('/').pop().replace('.md', '')}</h1>
                    <div style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: var(--secondary-color); font-weight: 700;">${path}</div>
                </div>
                <div class="markdown-content">${html}</div>
            `;

            viewer.style.display = 'block';
            document.body.style.overflow = 'hidden';

            body.querySelectorAll('a').forEach(link => {
                link.onclick = (e) => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('http')) {
                        e.preventDefault();
                        openRecipe(href.replace(/^\//, ''));
                    }
                };
            });
        } catch (err) { console.error(err); }
    }

    function closeRecipe() {
        document.getElementById('recipe-viewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function askChef() {
        const input = document.getElementById('chat-input');
        const log = document.getElementById('chat-log');
        if (!input.value) return;

        log.innerHTML += `<div style="margin-bottom: 10px;"><b>You:</b> ${input.value}</div>`;
        const q = input.value;
        input.value = "";

        const res = await gobi.sendMessage(q);
        log.innerHTML += `<div style="margin-bottom: 15px; color: var(--accent-color);"><b>Chef Mickey:</b> ${res}</div>`;
        log.scrollTop = log.scrollHeight;
    }
</script>

</body>
</html>
