<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey's Kitchen - Digital Brain Recipe</title>
    <!-- Gobi SDK -->
    <script src="https://gobispace.com/gobi.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --bg-color: #fffaf0; /* Warm Floral White */
            --text-color: #2c2c2c;
            --accent-color: #8b4513; /* Saddle Brown */
            --secondary-color: #556b2f; /* Dark Olive Green */
            --border-color: #e0d5c1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Recipe Header */
        header {
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: 40px;
            padding-bottom: 20px;
        }

        .kitchen-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--accent-color);
            margin: 0;
            font-style: italic;
        }

        .subtitle {
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            color: var(--secondary-color);
            font-weight: 700;
        }

        /* Cuisine Navigation (Folders) */
        .cuisine-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .cuisine-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 20px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .cuisine-btn:hover, .cuisine-btn.active {
            background: var(--accent-color);
            color: white;
        }

        /* Recipe Grid */
        .recipe-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .recipe-card {
            background: white;
            border: 1px solid var(--border-color);
            padding: 25px;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(139, 69, 19, 0.1);
        }

        .recipe-card .category {
            font-family: 'Roboto', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--secondary-color);
            font-weight: 700;
        }

        .recipe-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 10px 0;
            color: var(--text-color);
        }

        .recipe-card .snippet {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }

        /* Full Recipe Viewer */
        #recipe-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto;
            padding: 60px 20px;
        }

        .viewer-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .close-btn {
            position: fixed;
            top: 20px; right: 30px;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--accent-color);
        }

        /* Chat Sidebar (Chef AI) */
        .chef-ai {
            margin-top: 60px;
            border-top: 2px dashed var(--accent-color);
            padding-top: 40px;
            text-align: center;
        }

        #chat-window {
            max-width: 600px;
            margin: 0 auto 20px;
            height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid var(--border-color);
            padding: 20px;
            text-align: left;
            font-size: 0.95rem;
        }

        .input-group {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
        }

        #chat-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid var(--accent-color);
            font-family: 'Lora', serif;
        }

        .send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="subtitle">Personal Brain Culinary</div>
        <h1 class="kitchen-title">Mickey's Kitchen</h1>
        <p style="font-style: italic; color: #666; margin-top: 10px;">Carefully crafted thoughts and knowledge recipes.</p>
    </header>

    <nav class="cuisine-nav" id="cuisine-nav">
        <button class="cuisine-btn active" onclick="loadCuisine('all')">All Recipes</button>
        <!-- Folders will be loaded as Cuisines here -->
    </nav>

    <section>
        <h2 class="recipe-section-title" id="section-title">Today's Recommended Recipes</h2>
        <div class="recipe-grid" id="recipe-grid">
            <!-- Updates will be loaded as recipe cards -->
            <p style="text-align: center; grid-column: 1/-1;">Preparing the kitchen...</p>
        </div>
    </section>

    <footer class="chef-ai">
        <h3 style="font-family: 'Playfair Display'; font-style: italic;">Ask the Chef</h3>
        <p style="font-size: 0.9rem; color: #666;">Need help finding a specific knowledge recipe?</p>
        <div id="chat-window"></div>
        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Ask about a note or topic...">
            <button class="send-btn" onclick="sendMsg()">Ask AI</button>
        </div>
    </footer>
</div>

<!-- Recipe Viewer -->
<div id="recipe-viewer">
    <button class="close-btn" onclick="closeRecipe()">&times;</button>
    <div class="viewer-content">
        <div id="recipe-body"></div>
    </div>
</div>

<script>
    // Initialize Gobi SDK
    window.onload = async () => {
        try {
            // 1. Get Folders (Cuisines)
            const metadata = await gobi.vault.getMetadata();
            renderCuisineNav(metadata.folders);

            // 2. Load Initial Recipes (Latest Updates)
            const updates = await gobi.listBrainUpdates();
            renderRecipes(updates);
        } catch (e) {
            console.error("SDK Error:", e);
            document.getElementById('recipe-grid').innerHTML = "<p>Kitchen is temporarily closed. Please check connection.</p>";
        }
    };

    function renderCuisineNav(folders) {
        const nav = document.getElementById('cuisine-nav');
        // Filter out system folders
        const cleanFolders = (folders || []).filter(f => !f.startsWith('.') && !f.startsWith('_'));

        cleanFolders.forEach(folder => {
            const btn = document.createElement('button');
            btn.className = 'cuisine-btn';
            btn.innerText = folder;
            btn.onclick = () => loadCuisine(folder);
            nav.appendChild(btn);
        });
    }

    async function loadCuisine(folder) {
        // Update UI
        document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('section-title').innerText = folder === 'all' ? "Today's Recommended Recipes" : `${folder} Recipes`;

        try {
            if (folder === 'all') {
                const updates = await gobi.listBrainUpdates();
                renderRecipes(updates);
            } else {
                // In Gobi SDK, we can filter or search by path
                // For now, let's use search or a custom list
                const results = await gobi.vault.search(`path:${folder}`);
                renderRecipes(results);
            }
        } catch (e) {
            console.error(e);
        }
    }

    function renderRecipes(recipes) {
        const grid = document.getElementById('recipe-grid');
        grid.innerHTML = "";

        if (!recipes || recipes.length === 0) {
            grid.innerHTML = "<p style='text-align: center; grid-column: 1/-1;'>No recipes found in this category.</p>";
            return;
        }

        recipes.forEach(item => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.onclick = () => openRecipe(item.path);

            const folder = item.path.split('/')[0];
            card.innerHTML = `
                <div class="category">${folder}</div>
                <h3>${item.title || item.path.split('/').pop().replace('.md', '')}</h3>
                <div class="snippet">${item.snippet || "A carefully prepared note from the brain..."}</div>
                <div style="font-size: 0.7rem; color: #999;">Last updated: ${new Date(item.timestamp || Date.now()).toLocaleDateString()}</div>
            `;
            grid.appendChild(card);
        });
    }

    async function openRecipe(path) {
        const content = await gobi.vault.readFile(path);
        const html = gobi.renderMarkdown(content);
        document.getElementById('recipe-body').innerHTML = `
            <div style="text-align: center; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                <h1 style="font-family: 'Playfair Display'; color: var(--accent-color); font-size: 3rem;">${path.split('/').pop().replace('.md', '')}</h1>
                <div style="color: var(--secondary-color); font-weight: 700; text-transform: uppercase; font-size: 0.8rem;">${path}</div>
            </div>
            <div class="markdown-content">${html}</div>
        `;
        document.getElementById('recipe-viewer').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeRecipe() {
        document.getElementById('recipe-viewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const win = document.getElementById('chat-window');
        const text = input.value;
        if(!text) return;

        win.innerHTML += `<div style="margin-bottom: 10px;"><b>Guest:</b> ${text}</div>`;
        input.value = "";

        const response = await gobi.sendMessage(text);
        win.innerHTML += `<div style="margin-bottom: 15px; color: var(--accent-color);"><b>Chef AI:</b> ${response}</div>`;
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
