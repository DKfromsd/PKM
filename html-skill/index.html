<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Brain - @mickeyfromsd</title>
    <!-- Gobi SDK -->
    <script src="https://gobispace.com/gobi.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --bg-color: #fdfdfb;
            --text-color: #1a1a1a;
            --border-color: #333;
            --accent-color: #c00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Lora', serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Newspaper Header */
        header {
            text-align: center;
            border-bottom: 4px double var(--border-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .newspaper-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .metadata-bar {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 5px 0;
            margin-top: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Navigation */
        nav {
            margin-bottom: 20px;
            text-align: center;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Layout Grid */
        .main-content {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 30px;
        }

        .articles {
            column-count: 2;
            column-gap: 30px;
            column-rule: 1px solid #ddd;
        }

        @media (max-width: 900px) {
            .articles { column-count: 1; }
            .main-content { grid-template-columns: 1fr; }
        }

        article {
            break-inside: avoid;
            margin-bottom: 30px;
        }

        article h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            line-height: 1.1;
            cursor: pointer;
        }

        article h2:hover { color: var(--accent-color); }

        .date {
            font-family: 'Roboto', sans-serif;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 10px;
            display: block;
        }

        /* Sidebar & Chat */
        .sidebar {
            background: #f4f4f2;
            padding: 15px;
            border: 1px solid #ddd;
        }

        #chat-window {
            height: 300px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .input-group {
            display: flex;
        }

        #chat-input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            background: var(--border-color);
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Markdown Rendering */
        #content-viewer {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: white;
            z-index: 1000;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p style="margin: 0; font-family: 'Roboto'; font-weight: 700;">VOLT: <span id="vault-name-top">LOADING...</span></p>
        <h1 class="newspaper-title">The Daily Brain</h1>
        <div class="metadata-bar">
            <span>Volume I, No. 1</span>
            <span id="current-date">APRIL 12, 2026</span>
            <span id="vault-location">@mickeyfromsd</span>
        </div>
    </header>

    <nav>
        <a href="#">Latest Updates</a>
        <a href="javascript:void(0)" onclick="alert('Opening Knowledge Graph...')">Knowledge Graph</a>
        <a href="#">About</a>
    </nav>

    <div class="main-content">
        <section class="articles" id="article-list">
            <!-- Brain Updates will be loaded here -->
            <p>Fetching the latest brain updates...</p>
        </section>

        <aside class="sidebar">
            <h3 style="font-family: 'Playfair Display'; border-bottom: 2px solid #333;">Ask My Brain</h3>
            <div id="chat-window"></div>
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Type your question...">
                <button onclick="sendMsg()">Send</button>
            </div>
            <p style="font-size: 0.8rem; margin-top: 20px; font-style: italic;">
                "Your second brain, always accessible via Gobi AI."
            </p>
        </aside>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeViewer()"></div>
<div id="content-viewer">
    <button onclick="closeViewer()" style="float: right;">Close</button>
    <div id="markdown-body"></div>
</div>

<script>
    // Initialize Gobi SDK
    window.onload = async () => {
        try {
            const vault = await gobi.vault.getMetadata();
            document.getElementById('vault-name-top').innerText = vault.name || "MICKEYFROMSD";

            // Load Brain Updates
            const updates = await gobi.listBrainUpdates();
            renderArticles(updates);
        } catch (e) {
            console.error("SDK Error:", e);
            document.getElementById('article-list').innerHTML = "<p>Error loading updates. Please check connection.</p>";
        }
    };

    function renderArticles(updates) {
        const list = document.getElementById('article-list');
        list.innerHTML = "";

        updates.forEach(item => {
            const article = document.createElement('article');
            article.innerHTML = `
                <span class="date">${new Date(item.timestamp).toLocaleDateString()}</span>
                <h2 onclick="viewContent('${item.path}')">${item.title || item.path}</h2>
                <p>${item.snippet || "Click to read more about this update from the brain..."}</p>
            `;
            list.appendChild(article);
        });
    }

    async function viewContent(path) {
        const content = await gobi.vault.readFile(path);
        const html = gobi.renderMarkdown(content);
        document.getElementById('markdown-body').innerHTML = html;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('content-viewer').style.display = 'block';
    }

    function closeViewer() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('content-viewer').style.display = 'none';
    }

    async function sendMsg() {
        const input = document.getElementById('chat-input');
        const win = document.getElementById('chat-window');
        const text = input.value;
        if(!text) return;

        win.innerHTML += `<div><b>You:</b> ${text}</div>`;
        input.value = "";

        const response = await gobi.sendMessage(text);
        win.innerHTML += `<div style="margin-top: 10px; color: #c00;"><b>AI:</b> ${response}</div>`;
        win.scrollTop = win.scrollHeight;
    }

    // Enter key for chat
    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMsg();
    });
</script>

</body>
</html>
